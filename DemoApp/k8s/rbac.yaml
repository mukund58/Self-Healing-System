apiVersion: v1
kind: ServiceAccount
metadata:
  name: analyzer-sa
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: analyzer-role
rules:
  # Needed to patch deployments (rolling restart via annotation)
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "patch", "update"]
  # Needed to scale deployments
  - apiGroups: ["apps"]
    resources: ["deployments/scale"]
    verbs: ["get", "patch", "update"]
  # Needed to list/delete pods
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: analyzer-rolebinding
subjects:
  - kind: ServiceAccount
    name: analyzer-sa
roleRef:
  kind: Role
  name: analyzer-role
  apiGroup: rbac.authorization.k8s.io

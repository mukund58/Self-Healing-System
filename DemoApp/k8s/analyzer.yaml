apiVersion: apps/v1
kind: Deployment
metadata:
  name: analyzer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analyzer
  template:
    metadata:
      labels:
        app: analyzer
    spec:
      serviceAccountName: analyzer-sa
      containers:
        - name: analyzer
          image: analyzer:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_URLS
              value: "http://+:8080"
            - name: Endpoints__PrometheusBaseUrl
              value: "http://prometheus:9090"
            - name: Endpoints__TaskApiBaseUrl
              value: "http://taskapi"
          readinessProbe:
            httpGet:
              path: /status
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: analyzer
spec:
  selector:
    app: analyzer
  ports:
    - port: 80
      targetPort: 8080
